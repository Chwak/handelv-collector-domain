type Query @aws_cognito_user_pools {
  getCollectorProfile: CollectorProfile
  getCollectorSettings: CollectorSettings
  listSavedItems(limit: Int, nextToken: String): SavedItemsConnection
  listCollections(limit: Int, nextToken: String): CollectionsConnection
  listWishlists(limit: Int, nextToken: String): WishlistsConnection
  listFollows(limit: Int, nextToken: String): FollowsConnection
  getCollection(collectionId: ID!): Collection
  listCollectionItems(collectionId: ID!, limit: Int, nextToken: String): CollectionItemsConnection
}

type Mutation @aws_cognito_user_pools {
  updateCollectorProfile(input: UpdateCollectorProfileInput!): CollectorProfile
  updateCollectorSettings(input: UpdateCollectorSettingsInput!): CollectorSettings
  saveItem(input: SaveItemInput!): SavedItem
  unsaveItem(input: UnsaveItemInput!): Boolean
  createCollection(input: CreateCollectionInput!): Collection
  updateCollection(input: UpdateCollectionInput!): Collection
  deleteCollection(collectionId: ID!): Boolean
  addItemToCollection(input: AddItemToCollectionInput!): CollectionItem
  removeItemFromCollection(input: RemoveItemFromCollectionInput!): Boolean
  followMaker(input: FollowMakerInput!): Follow
  unfollowMaker(input: UnfollowMakerInput!): Boolean
  addToWishlist(input: AddToWishlistInput!): WishlistItem
  removeFromWishlist(input: RemoveFromWishlistInput!): Boolean
}

type Subscription @aws_cognito_user_pools {
  onCollectorProfileUpdated(userId: ID!): CollectorProfile
    @aws_subscribe(mutations: ["updateCollectorProfile"])
  onItemSaved(collectorUserId: ID!): SavedItem
    @aws_subscribe(mutations: ["saveItem"])
  onCollectionUpdated(collectionId: ID!): Collection
    @aws_subscribe(mutations: ["createCollection", "updateCollection"])
}

